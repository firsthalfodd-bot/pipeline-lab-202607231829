name: pr-lab
on:
  pull_request:
  pull_request_target:
    types: [opened, synchronize]
jobs:
  on_pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - run: echo "pr_from_fork_safe_path"
  on_prt:
    # Intentionally NO secrets - platform test only that untrusted code context is isolated
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    steps:
      - run: echo "prt_ref=${{ github.event.pull_request.head.sha }}"
      - run: echo "has_secret=${{ secrets.LAB_CANARY_SECRET != '' }}"